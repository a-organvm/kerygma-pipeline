name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies from GitHub
        env:
          ORCHESTRATION_PAT: ${{ secrets.ORCHESTRATION_PAT }}
          GH_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GH_TOKEN="${ORCHESTRATION_PAT:-$GH_TOKEN_FALLBACK}"
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::No token available for private dependency install; skipping tests."
            exit 0
          fi

          pip install "git+https://${GH_TOKEN}@github.com/organvm-vii-kerygma/announcement-templates.git"
          pip install "git+https://${GH_TOKEN}@github.com/organvm-vii-kerygma/social-automation.git"
          pip install "git+https://${GH_TOKEN}@github.com/organvm-vii-kerygma/distribution-strategy.git"
          pip install "git+https://${GH_TOKEN}@github.com/organvm-vii-kerygma/kerygma-profiles.git"
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -v
      - run: python -m ruff check kerygma_pipeline.py
